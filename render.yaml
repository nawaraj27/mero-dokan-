services:
  - type: web
    name: mero-dokan
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    packages:
      - tesseract-ocr
      - libtesseract-dev
    envVars:
      - key: OCR_LANGUAGES
        value: eng+nep
      - key: PYTHON_VERSION
        value: "3.11"
