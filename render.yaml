services:
  - type: web
    name: mero-dokan
    runtime: python

    buildCommand: |
      apt-get update -y

      apt-get install -y \
        tesseract-ocr \
        tesseract-ocr-eng \
        tesseract-ocr-nep \
        libtesseract-dev

      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

      - key: TESSERACT_CMD
        value: "/usr/bin/tesseract"

      - key: OCR_LANGUAGES
        value: "eng+nep"
