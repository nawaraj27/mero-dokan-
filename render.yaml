services:
  - type: web
    name: mero-dokan
    runtime: python-3.11.9

    buildCommand: >
      apt-get update &&
      apt-get install -y tesseract-ocr tesseract-ocr-nep libtesseract-dev &&
      pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
